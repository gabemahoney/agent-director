name: integration

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs of the same PR/branch when a new commit arrives —
# the harness is the expensive lane so two stacked runs is wasteful.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN. The test workflow only needs to read the
# repo's source; it does not write commits, comment on PRs, or publish
# artifacts. An overly-permissive default would let a compromised
# dependency in a future workflow step do more than it should.
permissions:
  contents: read

jobs:
  linux-integration:
    name: Docker harness — harness-smoke
    runs-on: ubuntu-latest
    # Hard cap on runtime; a hung Docker build or harness step otherwise
    # consumes runner minutes indefinitely. 30m is well above the
    # observed ~5–10m for harness-smoke under normal load.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build claude-director binary
        run: make build

      - name: Run make test-docker EPIC=harness-smoke
        env:
          # Either env var is sufficient for the driver-Claude path
          # (DRIVER_MODE=claude). The default DRIVER_MODE=shell does not
          # need a credential, but we still wire them through so a PR
          # author who opts into the credentialed lane gets it from CI
          # secrets, never plaintext in the repo. See
          # docs/architecture.md "Test Harness — CI auth".
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: make test-docker EPIC=harness-smoke

  macos-probe:
    # Exercises the sysctl-based liveness prober on actual macOS so the
    # build-tagged probe_darwin.go path is verified against the real
    # KERN_PROCARGS2 surface. The unit test launches a child with
    # CLAUDE_DIRECTOR_INSTANCE_ID set and polls until the prober sees
    # it. See SRD §19 Q7.
    name: macOS lane — probe sysctl path
    runs-on: macos-latest
    # Same 30m cap as the linux job; the unit test should finish in
    # under a minute but the runner provisioning + checkout can add
    # several minutes on a cold-cache day.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Cross-compile darwin build sanity
        run: go build ./...

      - name: Run probe darwin tests
        run: go test ./internal/probe/...
