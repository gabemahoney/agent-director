[test]
preload = ["./test/setup.ts"]
# Parallel mode deadlocks on shared subprocess/store state (b.w7e: parallel
# build of bin/agent-director races into ETXTBSY at scale). Until that root
# cause is fixed, the release-time gate (gates/coverage/bun-test.sh) invokes
# `bun test` which picks up this config. The line below is forward-looking:
# bun 1.3.13 does NOT yet honor `parallel` as a bunfig key under [test]; once
# it does, both the gate invocation and ad-hoc `bun test` runs will pick it up.
parallel = 1
