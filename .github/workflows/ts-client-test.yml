# ts-client-test: run the full pkg/ts-bun-client bun test suite on every PR and push.
#
# This workflow closes the CI gap surfaced by b.bwn: the entire
# pkg/ts-bun-client/test/*.test.ts suite was previously never run by any CI
# workflow. A PR that stripped `get-permission` from VERBS, dropped
# `--request-token` from buildDecide, or removed one of the four typed error
# classes added by b.h1r/m61 would pass CI green and ship the regression.
#
# Regression caught:
#   b.bwn — bun test not run by CI (this workflow closes Gap 1).
#   b.h1r — TS Client surface for m61: getPermission, decide --request-token,
#            four typed error classes. The argv-builder, errors, error-map,
#            smoke/get-permission, and smoke/decide tests are now CI-gated.
#
# Tripwire procedure
# ------------------
# Remove `get-permission` from pkg/ts-bun-client/src/internal/verbs.ts:VERBS.
# argv-builder.test.ts should fail (no get-permission entry in the generated
# argv map); this workflow then catches it on the next PR/push.
#
# Local actionlint
# ----------------
#   go install github.com/rhysd/actionlint/cmd/actionlint@v1.6.27
#   actionlint .github/workflows/ts-client-test.yml

name: ts-client-test

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs of the same PR/branch when a new commit arrives;
# the bun test suite is fast (seconds to low minutes) so cancellation is
# mostly a CI hygiene measure that matches the convention of peer workflows.
concurrency:
  group: ts-client-test-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: the test suite only needs to read the repo.
permissions:
  contents: read

jobs:
  bun-test:
    name: bun test — pkg/ts-bun-client
    runs-on: ubuntu-latest
    # Hard cap on runtime; the full bun test suite completes in well under
    # 5 minutes under normal load. 15m absorbs cold-cache runner provisioning
    # and any subprocess-heavy smoke tests.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: 'go.mod'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: "1.3.13"  # pinned; matches BUN_VERSION in test/Dockerfile — unpinned latest risks non-deterministic major-version breakage

      - name: Build agent-director binary
        run: mkdir -p bin && go build -o bin/agent-director ./cmd/agent-director

      - name: Install ts-bun-client dependencies
        run: cd pkg/ts-bun-client && bun install --frozen-lockfile

      - name: Run bun test
        run: cd pkg/ts-bun-client && bun test
